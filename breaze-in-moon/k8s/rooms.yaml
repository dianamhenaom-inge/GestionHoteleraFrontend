apiVersion: apps/v1
kind: Deployment
metadata:
  name: rooms-app
  namespace: breaze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rooms-app
  template:
    metadata:
      labels:
        app: rooms-app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rooms-mysql 3306; do echo "Waiting for rooms-mysql..."; sleep 3; done']
      containers:
        - name: rooms-app
          image: breaze-rooms:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://rooms-mysql:3306/roomsdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: none
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: jwt-secret
            - name: SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: service-secret
            - name: AUDIT_URL
              value: http://gateway:9090/api/audit/events
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rooms-app
  namespace: breaze
spec:
  selector:
    app: rooms-app
  ports:
    - port: 8080
      targetPort: 8080
