apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-app
  namespace: breaze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-app
  template:
    metadata:
      labels:
        app: auth-app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z auth-mysql 3306; do echo "Waiting for auth-mysql..."; sleep 3; done']
      containers:
        - name: auth-app
          image: breaze-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://auth-mysql:3306/authdb
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-password
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: none
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: jwt-secret
            - name: AUDIT_URL
              value: http://gateway:9090/api/audit/events
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-app
  namespace: breaze
spec:
  selector:
    app: auth-app
  ports:
    - port: 8080
      targetPort: 8080
