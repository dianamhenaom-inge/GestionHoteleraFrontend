apiVersion: v1
kind: ConfigMap
metadata:
  name: books-mysql-init
  namespace: breaze
data:
  booksdb.sql: |
    CREATE TABLE IF NOT EXISTS books (
        id         BIGINT      AUTO_INCREMENT PRIMARY KEY,
        room_id    BIGINT      NOT NULL,
        user_id    VARCHAR(100) NOT NULL,
        start_date DATE        NOT NULL,
        end_date   DATE        NOT NULL,
        status     VARCHAR(20) NOT NULL DEFAULT 'ACTIVE',
        created_at TIMESTAMP            DEFAULT CURRENT_TIMESTAMP
    );
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: books-mysql-pvc
  namespace: breaze
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-mysql
  namespace: breaze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: books-mysql
  template:
    metadata:
      labels:
        app: books-mysql
    spec:
      containers:
        - name: books-mysql
          image: mysql:8.4.6
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-root-password
            - name: MYSQL_DATABASE
              value: booksdb
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: breaze-secrets
                  key: db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-padmin123"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: books-mysql-pvc
        - name: init-sql
          configMap:
            name: books-mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: books-mysql
  namespace: breaze
spec:
  selector:
    app: books-mysql
  ports:
    - port: 3306
      targetPort: 3306
