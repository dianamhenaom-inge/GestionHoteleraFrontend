services:
  mysql:
    image: mysql:8.4.6
    container_name: rooms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: roomsdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - rooms-data:/var/lib/mysql
      - ./src/main/resources/roomsdb.sql:/docker-entrypoint-initdb.d/roomsdb.sql
    networks:
      - rooms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rooms-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomsdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      SERVICE_SECRET: breaze-internal-secret-2024
    ports:
      - "8082:8080"
    networks:
      - rooms-network

volumes:
  rooms-data:

networks:
  rooms-network:
    name: rooms-network
